<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Basics</title>
  
  <link rel="stylesheet" href="styles.css">

  <style>
    h3 {
      color: red;
    }
  </style>

</head>
<body>

  <h1>Intro to CSS & Including CSS in a Web Page</h1>

  <h2>Inline styles</h2>

  <p style="color: blue;">Hello,CSS!</p>

  <h2>Internal styles</h2>

  <h3>Hello, CSS!</h3>

  <div>
    <p>This paragraph has been styled with external stylesheets.</p>
  </div>
  
</body>
</html>
