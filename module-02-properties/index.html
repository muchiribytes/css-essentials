<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6: Color Models & UI Depth Lab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="color-lab-card">
        <header>
            <h1 class="glowing-title">Color Models & Depth</h1>
            <p>Mastering HEX, RGB, HSL, and interactive color properties.</p>
            
            <div class="input-group">
                <label for="demo-input">Interactive Search Bar:</label>
                <input type="text" id="demo-input" placeholder="Click to see focus outline...">
            </div>
        </header>

        <section class="palette-container">
            <h2>The Color Model Breakdown</h2>
            
            <div class="swatch hex-box">
                <span>HEX (#3498db)</span>
            </div>
            
            <div class="swatch rgb-box">
                <span>RGB (rgb(46, 204, 113))</span>
            </div>
            
            <div class="swatch hsl-box">
                <span>HSL (hsl(280, 60%, 50%))</span>
            </div>

            <div class="swatch rgba-shadow-box">
                <span>Alpha Transparency (RGBA) & Depth Shadow</span>
            </div>
        </section>
    </main>

</body>
</html>
